# Arcanea Agent profile — Hermes Desktop skin (Plan B ship).
# Users keep provider credentials in Hermes; these are safe creative defaults.

model:
  provider: xai
  default: grok-4.3

agent:
  max_turns: 90
  tool_use_enforcement: true

memory:
  memory_enabled: true
  user_profile_enabled: true

compression:
  enabled: true

approvals:
  mode: manual

security:
  redact_secrets: true

# Model routing hints (Hermes reads provider; skills enforce task-class picks)
routing:
  media.image: grok-build
  media.video: grok-build
  research.quick: grok-4.3
  world.canon: claude-opus-4-7
  world.character: claude-opus-4-7
  code.implement: grok-build

mcp_servers:
  arcanea_registry:
    command: node
    args:
      - "${ARCANEA_REPO}/packages/arcanea-registry-mcp/dist/cli.js"
    env:
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
    timeout: 120
    connect_timeout: 60
    enabled: false